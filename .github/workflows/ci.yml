name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ruby:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: [ "3.3", "3.4", "4.0", "head" ]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake

  test:
    needs: ruby
    runs-on: ubuntu-latest
    steps:
      - run: echo "all Rubies passed"
